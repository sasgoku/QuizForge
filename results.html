<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results — QuizForge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body class="app-body">

  <!-- Navigation -->
  <nav class="navbar navbar-app">
    <div class="nav-inner">
      <a href="teacher.html" class="logo">Quiz<span>Forge</span></a>
      <a href="teacher.html" class="btn btn-outline-nav">← Back to Panel</a>
    </div>
  </nav>

  <div class="results-container">

    <!-- LOADING STATE -->
    <div id="resultsLoading" class="state-center">
      <div class="spinner spinner-lg"></div>
      <p>Fetching results…</p>
    </div>

    <!-- ERROR STATE -->
    <div id="resultsError" class="state-center hidden">
      <div class="state-icon-lg">⚠️</div>
      <h2>Invalid Quiz</h2>
      <p>No quiz ID provided or quiz not found.</p>
      <a href="teacher.html" class="btn btn-primary">Back to Panel</a>
    </div>

    <!-- RESULTS CONTENT -->
    <div id="resultsContent" class="hidden">

      <!-- Page Header -->
      <div class="results-header">
        <div>
          <div class="section-label">RESULTS</div>
          <h1 id="resultsQuizTitle" class="results-title">Quiz Title</h1>
          <p id="resultsMeta" class="results-meta">Loading…</p>
        </div>
        <div class="results-header-actions">
          <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
          <button class="btn btn-ghost" id="expandAllBtn">Expand All</button>
          <button class="btn btn-primary" id="exportCsvBtn">Export CSV</button>
        </div>
      </div>

      <!-- Summary Stats Row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-num" id="statTotal">0</div>
          <div class="stat-card-label">Submissions</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statAvg">—</div>
          <div class="stat-card-label">Average Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statHighest">—</div>
          <div class="stat-card-label">Highest</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statLowest">—</div>
          <div class="stat-card-label">Lowest</div>
        </div>
      </div>

      <!-- Search + Sort Toolbar -->
      <div id="resultsToolbar" class="results-toolbar hidden">
        <input
          type="text"
          id="searchInput"
          class="text-input search-input"
          placeholder="🔍  Search by student name…"
          autocomplete="off"
        />
        <div class="sort-group">
          <label class="sort-label" for="sortSelect">Sort</label>
          <select id="sortSelect" class="sort-select">
            <option value="date-desc">Latest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="score-desc">Highest score</option>
            <option value="score-asc">Lowest score</option>
            <option value="name-asc">Name A–Z</option>
          </select>
        </div>
      </div>

      <!-- Empty Results State -->
      <div id="noResults" class="state-box hidden">
        <div class="state-icon">📭</div>
        <p>No submissions yet. Share the quiz link with students!</p>
        <div class="quiz-link-copy-row">
          <input type="text" id="quizShareLink" class="link-input" readonly />
          <button class="btn btn-primary btn-sm" id="copyShareLinkBtn">Copy Link</button>
        </div>
      </div>

      <!-- No search match message -->
      <div id="noSearchMatch" class="state-box hidden">
        <div class="state-icon">🔍</div>
        <p id="noSearchMatchText">No students match your search.</p>
      </div>

      <!-- Student Accordion List -->
      <div id="studentList" class="student-list hidden"></div>

    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/results.js"></script>

</body>
</html>
